name: Conventional Commits

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited

jobs:
  conventional-commits:
    runs-on: codeberg-tiny

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Conventional Commits
        uses: https://github.com/webiny/action-conventional-commits@v1.3.1
